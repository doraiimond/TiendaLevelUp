<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Perfil Administrador</title>
    <link rel="icon" href="../image/logo.png" type="image/x-icon">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap y estilos -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: black;
            color: white;
        }

        .card {
            background-color: #1c1c1c;
            border-radius: 10px;
            overflow: hidden;
            max-width: 400px;
            margin: 2rem auto;
            text-align: center;
        }

        .card__img img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .card__avatar img {
            width: 100px;
            height: 100px;
            margin-top: -50px;
            border-radius: 50%;
            border: 3px solid #fff;
            background-color: white;
        }

        .card__title {
            font-size: 1.5rem;
            margin-top: 10px;
        }

        .card__subtitle {
            color: gold;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .Menu {
            max-width: 500px;
            margin: 0 auto;
            padding: 1rem;
        }

        .Menub {
            display: block;
            background-color: #333;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            text-decoration: none;
            color: white;
        }

        .Menub span {
            font-weight: bold;
            color: #0dcaf0;
        }
    </style>
</head>

<body>
    <!-- Barra de navegación -->
    <header>
        <nav class="Barra-Arriba">
            <ul>
                <a class="control">🎮</a>
                <a href="../index.html" class="marco"> Home</a>
                <a href="../page/nosotros.html" class="marco"> Nosotros</a>
                <a href="../page/contacto.html" class="marco"> Contacto</a>
                <a href="../page/Tiendahtml/tienda.html" class="marco"> Tienda</a>
            </ul>
        </nav>
    </header>

    <main>
        <!-- Perfil administrador -->
        <div class="card">
            <div class="card__img">
                <img src="../image/banner.webp" alt="Fondo perfil administrador">
            </div>
            <div class="card__avatar">
                <img src="../image/admin.png" alt="Avatar administrador">
            </div>
            <div class="card__title">
                <span id="nombreTitulo">JUAN PÉREZ</span>
            </div>
            <div class="card__subtitle">Administrador</div>
        </div>

        <!-- Datos del administrador -->
        <div class="Menu">
            <a class="Menub">RUN: <span id="runDisplay">12345678-9</span></a>
            <a class="Menub">NOMBRE: <span id="nombreDisplay">Juan Pérez</span></a>
            <a class="Menub">CORREO ELECTRÓNICO: <span id="correoDisplay">admin@ejemplo.com</span></a>
            <a class="Menub">CLAVE: <span id="claveDisplay">********</span></a>
            <a class="Menub">FECHA DE NACIMIENTO: <span id="fechaDisplay">1980-05-15</span></a>
            <a class="Menub">ROL: <span id="rolDisplay">Administrador</span></a>
        </div>
    </main>

    <!-- Scripts y enlaces -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
</body>
</html>
